<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Architecture tests as an early quality gate</title>
  <desc id="desc">A conceptual diagram showing human and AI generated changes moving through compiler, linter, unit tests, and architecture tests before merge.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2.5; rx: 18; }
      .soft { fill: #eef2ff; stroke: #4f46e5; }
      .green { fill: #ecfdf5; stroke: #059669; }
      .red { fill: #fef2f2; stroke: #dc2626; }
      .amber { fill: #fffbeb; stroke: #d97706; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #111827; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #111827; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #374151; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #4b5563; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>

  <text class="title" x="640" y="70" text-anchor="middle">Architecture Tests Catch Valid Code That Breaks Design</text>
  <text class="small" x="640" y="108" text-anchor="middle">The compiler can say "yes" while the architecture should say "not here."</text>

  <rect class="box soft" x="70" y="190" width="230" height="130"/>
  <text class="label" x="185" y="242" text-anchor="middle">Code Change</text>
  <text class="small" x="185" y="278" text-anchor="middle">Human developer</text>
  <text class="small" x="185" y="304" text-anchor="middle">or AI agent</text>

  <path class="arrow" d="M300 255 H390"/>

  <rect class="box green" x="390" y="155" width="220" height="90"/>
  <text class="label" x="500" y="193" text-anchor="middle">Compiler</text>
  <text class="tiny" x="500" y="222" text-anchor="middle">Valid Kotlin?</text>

  <rect class="box green" x="390" y="270" width="220" height="90"/>
  <text class="label" x="500" y="308" text-anchor="middle">Linter</text>
  <text class="tiny" x="500" y="337" text-anchor="middle">Style and local smells?</text>

  <rect class="box green" x="390" y="385" width="220" height="90"/>
  <text class="label" x="500" y="423" text-anchor="middle">Unit Tests</text>
  <text class="tiny" x="500" y="452" text-anchor="middle">Expected behavior?</text>

  <path class="arrow" d="M610 200 H720"/>
  <path class="arrow" d="M610 315 H720"/>
  <path class="arrow" d="M610 430 H720"/>

  <rect class="box amber" x="720" y="215" width="250" height="170"/>
  <text class="label" x="845" y="268" text-anchor="middle">Architecture Tests</text>
  <text class="small" x="845" y="305" text-anchor="middle">Does the change respect</text>
  <text class="small" x="845" y="333" text-anchor="middle">module, layer, and API</text>
  <text class="small" x="845" y="361" text-anchor="middle">boundaries?</text>

  <path class="arrow" d="M970 300 H1055"/>

  <rect class="box red" x="1055" y="190" width="170" height="100"/>
  <text class="label" x="1140" y="233" text-anchor="middle">Fail Early</text>
  <text class="tiny" x="1140" y="262" text-anchor="middle">Boundary crossed</text>

  <rect class="box green" x="1055" y="330" width="170" height="100"/>
  <text class="label" x="1140" y="373" text-anchor="middle">Merge</text>
  <text class="tiny" x="1140" y="402" text-anchor="middle">Structure intact</text>

  <path class="dash" d="M845 385 C845 520 320 545 185 340"/>
  <text class="tiny" x="640" y="565" text-anchor="middle">Example rule: domain code must not depend on data implementations, even if the import compiles.</text>
</svg>
