mermaid:
  version: "9.4.3"

sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - color-functions
    - global-builtin


callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: red
  caution:
    title: Caution
    color: yellow
