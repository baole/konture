title: Konture
description: "A fast, standalone Kotlin architecture testing library that runs as fast unit tests against the actual Gradle build graph."
baseurl: "/konture"
logo: "/assets/images/logo.png"
favicon_ico: "/assets/images/logo.png"
remote_theme: "just-the-docs/just-the-docs"
permalink: pretty
plugins:
  - jekyll-seo-tag
  - jekyll-default-layout
  - jekyll-remote-theme
  - jekyll-relative-links
keep_files: [kdoc] # Preserve pre-compiled Dokka HTML folders
exclude: [kdoc] # Avoid processing pre-compiled Dokka HTML pages

