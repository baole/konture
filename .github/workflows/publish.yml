name: Publish to Registries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggers for testing or out-of-band releases

permissions:
  contents: read

jobs:
  publish-gradle:
    name: Publish Gradle Libraries & Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --batch --import

      - name: Publish Libraries to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        # Runs the release publish with signing required
        run: |
          ./gradlew publish \
            -PreleaseBuild=true \
            -PsigningKey="$GPG_SIGNING_KEY" \
            -PsigningPassword="$GPG_SIGNING_PASSWORD"

      - name: Publish Plugin to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew :plugin-gradle:publishPlugins

  publish-maven:
    name: Publish Maven Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: ossrh # Configures settings.xml under ~/.m2/settings.xml with 'ossrh' servers
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build and Deploy Maven Plugin
        working-directory: plugin-maven
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          # Deploy with GPG signing activated in the release profile
          mvn clean deploy -P release -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE"
