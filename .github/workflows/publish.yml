name: Publish to Registries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggers for testing or out-of-band releases

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-gradle:
    name: Publish Gradle Libraries & Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --batch --import

      - name: Publish Gradle Libraries to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        # Automatically validates and releases Gradle libraries (core & library) to Central Portal
        run: |
          ./gradlew publishAllPublicationsToCentralPortal \
            -PreleaseBuild=true \
            -PsigningKey="$GPG_SIGNING_KEY" \
            -PsigningPassword="$GPG_SIGNING_PASSWORD"

      - name: Publish Gradle Plugin to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew :plugin-gradle:publishPlugins

  publish-maven:
    name: Publish Maven Plugin
    needs: publish-gradle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          server-id: central # Configures settings.xml under ~/.m2/settings.xml with 'central' server
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish Core to Maven Local
        run: ./gradlew publishToMavenLocal

      - name: Build and Deploy Maven Plugin
        working-directory: plugin-maven
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          # Deploy with GPG signing activated in release profile; central-publishing-maven-plugin validates and releases automatically
          mvn clean deploy -P release -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE"


