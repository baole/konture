name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Run KtLint Checks
        run: ./gradlew ktlintCheck

      - name: Run Detekt Static Analysis
        run: ./gradlew detekt

      - name: Publish Core to Maven Local
        run: ./gradlew publishToMavenLocal

      - name: Run Unit and Architecture Tests
        run: ./gradlew test

      - name: Build Gradle Projects
        run: ./gradlew build -x test

      - name: Build and Install Maven Plugin
        run: mvn clean install -f plugin-maven/pom.xml

      - name: Build and Test Sample Maven Showcase
        run: mvn clean test -f showcases/sample-maven/pom.xml
