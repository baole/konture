# ClassesRuleBuilder
classes.rule.noAssertion=類別規則沒有斷言（''should()''）。您必須指定至少一個斷言條件。
classes.rule.violationHeader=檢測到類別架構違規：
classes.rule.negatedSatisfied=類別 {0} 不應該滿足被否定（negated）的條件。
classes.rule.eitherOr=類別 {0} 應該滿足以下之一：({1}) 或 ({2})
classes.rule.xor=類別 {0} 應該只滿足互斥或 (XOR) 斷言中的一個。
classes.rule.emptySelect=沒有類別符合 ''that()'' 中的過濾條件。如果符合預期，請在 rule builder 中使用 ''.allowEmpty()'' 或 ''allowEmpty = true'' 以允許空選擇。


